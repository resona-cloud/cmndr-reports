<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peak Flow — Operational Report</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #efefec;
      --text: #1a1a18; --text2: #6b6b67; --text3: #9c9a92;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.18);
      --radius-md: 8px; --radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
        --text: #e8e6de; --text2: #9c9a92; --text3: #6b6b67;
        --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.18);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; padding: 24px 16px 48px; }
    .container { max-width: 820px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .client-name { font-size: 22px; font-weight: 500; }
    .report-meta { font-size: 13px; color: var(--text2); margin-top: 3px; }
    .controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .range-btns { display: flex; gap: 4px; }
    .range-btn { font-size: 12px; padding: 6px 12px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text2); cursor: pointer; }
    .range-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }
    .custom-range { display: none; gap: 6px; align-items: center; }
    .custom-range.visible { display: flex; }
    .custom-range input { font-size: 12px; padding: 5px 8px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); }
    .btn { font-size: 12px; padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg); color: var(--text); cursor: pointer; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
    .action-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 20px; padding-top: 20px; border-top: 0.5px solid var(--border); }
    .sec-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin: 24px 0 10px; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
    .kpi { background: var(--bg); border-radius: var(--radius-md); padding: 14px; border: 0.5px solid var(--border); }
    .kpi-label { font-size: 12px; color: var(--text2); margin-bottom: 4px; }
    .kpi-val { font-size: 22px; font-weight: 500; }
    .kpi-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 4px; }
    .funnel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .funnel-row:last-child { margin-bottom: 0; }
    .funnel-label { font-size: 12px; color: var(--text2); min-width: 76px; }
    .funnel-bar-wrap { flex: 1; background: var(--bg2); border-radius: 4px; height: 18px; overflow: hidden; }
    .funnel-bar { height: 100%; border-radius: 4px; transition: width .7s ease; }
    .funnel-val { font-size: 12px; font-weight: 500; min-width: 56px; text-align: right; }
    .funnel-delta { font-size: 11px; min-width: 28px; text-align: right; }
    .job-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 0.5px solid var(--border); gap: 8px; }
    .job-row:last-child { border: none; padding-bottom: 0; }
    .job-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .job-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .job-right { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 500; white-space: nowrap; }
    .b-done { background: #E1F5EE; color: #085041; }
    .b-prog { background: #E6F1FB; color: #0C447C; }
    .b-sched { background: #f0f0ee; color: #6b6b67; border: 0.5px solid #ccc; }
    .b-canc { background: #FCEBEB; color: #791F1F; }
    .b-hi { background: #FAECE7; color: #712B13; }
    .b-med { background: #FAEEDA; color: #633806; }
    .b-lo { background: #f0f0ee; color: #6b6b67; border: 0.5px solid #ccc; }
    .tech-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .tech-row:last-child { border: none; padding-bottom: 0; }
    .tech-avatar { width: 34px; height: 34px; border-radius: 50%; background: #E6F1FB; color: #0C447C; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 500; flex-shrink: 0; }
    .tech-name { font-size: 13px; font-weight: 500; }
    .tech-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .util-track { flex: 1; background: var(--bg2); border-radius: 4px; height: 5px; margin-top: 6px; }
    .util-fill { height: 5px; border-radius: 4px; transition: width .7s ease; }
    .util-pct { font-size: 13px; font-weight: 500; min-width: 36px; text-align: right; }
    .alert-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
    .alert-row:last-child { border: none; padding-bottom: 0; }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 4px; flex-shrink: 0; }
    .dot-critical { background: #E24B4A; }
    .dot-warning { background: #EF9F27; }
    .dot-info { background: #378ADD; }
    .alert-msg { font-size: 13px; }
    .alert-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .ai-box { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }
    .ai-label { font-size: 11px; font-weight: 500; color: #378ADD; margin-bottom: 8px; }
    .ai-text { font-size: 14px; line-height: 1.7; color: var(--text); }

    /* ── Audio player ── */
    .audio-card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 14px 16px; margin-top: 8px; }
    .audio-header { display: flex; align-items: center; gap: 6px; margin-bottom: 12px; }
    .audio-lbl { font-size: 11px; font-weight: 500; color: var(--text2); }
    .audio-idle { display: flex; align-items: center; gap: 8px; }
    .audio-gen-btn { font-size: 12px; padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border2); background: var(--bg2); color: var(--text); cursor: pointer; font-weight: 500; transition: background .1s; }
    .audio-gen-btn:hover { background: var(--text); color: var(--bg); }
    .audio-gen-btn:disabled { opacity: .5; cursor: not-allowed; }
    .audio-loading { display: none; align-items: center; gap: 8px; font-size: 12px; color: var(--text2); }
    .audio-player-row { display: none; align-items: center; gap: 10px; }
    .audio-error { display: none; font-size: 12px; color: #E24B4A; }
    .play-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border2); background: var(--bg2); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background .1s; }
    .play-btn:hover { background: var(--text); color: var(--bg); border-color: var(--text); }
    .play-btn svg { pointer-events: none; }
    .progress-wrap { flex: 1; height: 4px; background: var(--bg3); border-radius: 2px; cursor: pointer; position: relative; }
    .progress-fill { height: 4px; background: #378ADD; border-radius: 2px; width: 0; transition: width .1s linear; pointer-events: none; }
    .time-display { font-size: 11px; color: var(--text3); font-variant-numeric: tabular-nums; white-space: nowrap; flex-shrink: 0; }
    .regen-btn { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; padding: 2px 4px; border-radius: 4px; transition: color .1s; flex-shrink: 0; }
    .regen-btn:hover { color: var(--text); }
    .audio-spin { width: 14px; height: 14px; border: 2px solid var(--border2); border-top-color: #378ADD; border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .skeleton { background: var(--bg2); border-radius: 4px; height: 14px; margin: 6px 0; animation: pulse 1.4s ease-in-out infinite; }
    .empty { font-size: 13px; color: var(--text2); padding: 4px 0; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--text); color: var(--bg); font-size: 13px; padding: 10px 18px; border-radius: var(--radius-md); opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; }
    .toast.show { opacity: 1; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }

    @page { margin: 16mm; }
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #ffffff !important; padding: 0 !important; color: #1a1a18 !important; }
      .controls, .action-bar, .toast { display: none !important; }
      .container { max-width: 100% !important; }
      .card { border: 1px solid #e0e0de !important; break-inside: avoid; }
      .kpi { border: 1px solid #e0e0de !important; background: #f5f5f3 !important; }
      .sec-label { margin-top: 16px; }
      .funnel-bar-wrap { background: #e8e8e6 !important; }
      .funnel-bar { print-color-adjust: exact !important; -webkit-print-color-adjust: exact !important; }
      .util-track { background: #e8e8e6 !important; }
      .ai-box { background: #f0f7ff !important; border: 1px solid #b5d4f4 !important; }
      .ai-label { color: #185FA5 !important; }
      .header { margin-bottom: 12px; }
      .b-done { background: #E1F5EE !important; color: #085041 !important; }
      .b-prog { background: #E6F1FB !important; color: #0C447C !important; }
      .b-hi { background: #FAECE7 !important; color: #712B13 !important; }
      .b-med { background: #FAEEDA !important; color: #633806 !important; }
      .b-canc { background: #FCEBEB !important; color: #791F1F !important; }
      .dot-critical { background: #E24B4A !important; }
      .dot-warning { background: #EF9F27 !important; }
      .dot-info { background: #378ADD !important; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <div class="client-name">Peak Flow Plumbing & HVAC</div>
      <div class="report-meta" id="report-meta">Operational report — loading...</div>
    </div>
    <div class="controls">
      <div class="range-btns">
        <button class="range-btn active" data-range="7d" onclick="setRange('7d')">7 days</button>
        <button class="range-btn" data-range="30d" onclick="setRange('30d')">30 days</button>
        <button class="range-btn" data-range="mtd" onclick="setRange('mtd')">Month</button>
        <button class="range-btn" data-range="qtd" onclick="setRange('qtd')">Quarter</button>
        <button class="range-btn" data-range="custom" onclick="setRange('custom')">Custom</button>
      </div>
      <div class="custom-range" id="custom-range">
        <input type="date" id="from-date" />
        <span style="font-size:12px;color:var(--text2);">to</span>
        <input type="date" id="to-date" />
        <button class="btn" onclick="loadCustom()">Apply</button>
      </div>
      <button class="btn" onclick="loadAll()">Refresh</button>
    </div>
  </div>

  <div class="sec-label">Key metrics</div>
  <div class="kpi-grid" id="kpis">
    <div class="kpi"><div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:40%"></div></div>
    <div class="kpi"><div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:40%"></div></div>
    <div class="kpi"><div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:40%"></div></div>
    <div class="kpi"><div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:40%"></div></div>
    <div class="kpi"><div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:40%"></div></div>
    <div class="kpi"><div class="skeleton" style="width:60%"></div><div class="skeleton" style="width:40%"></div></div>
  </div>

  <div class="sec-label">Pipeline funnel — this week vs last week</div>
  <div class="card" id="funnel-wrap"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>

  <div class="sec-label">Jobs in period</div>
  <div class="card" id="jobs-wrap"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>

  <div class="sec-label">Technician workload</div>
  <div class="card" id="tech-wrap"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></div>

  <div class="sec-label">Active alerts</div>
  <div class="card" id="alerts-wrap"><div class="skeleton"></div><div class="skeleton"></div></div>

  <div class="sec-label">AI briefing</div>
  <div class="ai-box">
    <div class="ai-label">Claude — operational summary</div>
    <div class="ai-text" id="ai-summary"><div class="skeleton"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:60%"></div></div>
  </div>

  <div class="audio-card">
    <div class="audio-header">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="color:var(--text3)"><path d="M7 1.5a5.5 5.5 0 010 11M4 3.5a3 3 0 000 7M1.5 5.5a1 1 0 000 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <span class="audio-lbl">Audio briefing</span>
    </div>
    <div class="audio-idle" id="audio-idle">
      <button class="audio-gen-btn" id="audio-gen-btn" onclick="generateAudio()">Generate audio</button>
      <span style="font-size:11px;color:var(--text3);">Spoken by Rachel via ElevenLabs</span>
    </div>
    <div class="audio-loading" id="audio-loading">
      <div class="audio-spin"></div>
      <span>Generating…</span>
    </div>
    <div class="audio-player-row" id="audio-player-row">
      <button class="play-btn" id="play-btn" onclick="togglePlay()">
        <svg id="play-icon" width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><polygon points="4,2 12,7 4,12"/></svg>
        <svg id="pause-icon" width="14" height="14" viewBox="0 0 14 14" fill="currentColor" style="display:none"><rect x="3" y="2" width="3" height="10" rx="1"/><rect x="8" y="2" width="3" height="10" rx="1"/></svg>
      </button>
      <div class="progress-wrap" id="progress-wrap" onclick="seekAudio(event)">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <span class="time-display" id="time-display">0:00 / 0:00</span>
      <button class="regen-btn" onclick="generateAudio()">Regenerate</button>
    </div>
    <div class="audio-error" id="audio-error">
      <span id="audio-err-msg">Generation failed.</span>
      <button class="regen-btn" onclick="generateAudio()" style="color:#378ADD;margin-left:6px;">Retry</button>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-primary" onclick="downloadPDF()">Download PDF</button>
    <button class="btn" id="send-btn" onclick="sendReport()">Send report</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/report';
const WEBHOOK = 'https://hook.us2.make.com/fsilm67y7ny25rfo7ulhhdket8snpmcd';
let currentRange = '7d';
let currentFrom = null;
let currentTo = null;

function fmt$(n) { return '$' + Math.round(n).toLocaleString(); }
function statusBadge(s) {
  const map = { completed:'b-done', 'in-progress':'b-prog', scheduled:'b-sched', cancelled:'b-canc' };
  const label = { completed:'Done', 'in-progress':'In progress', scheduled:'Scheduled', cancelled:'Cancelled' };
  return '<span class="badge '+(map[s]||'b-sched')+'">'+(label[s]||s)+'</span>';
}
function prioBadge(p) {
  const map = { high:'b-hi', medium:'b-med', low:'b-lo' };
  return '<span class="badge '+(map[p]||'b-lo')+'">'+p+'</span>';
}
function initials(name) { return name.split(' ').map(p=>p[0]).join(''); }
function utilColor(pct) { return pct>=85?'#E24B4A':pct>=70?'#EF9F27':'#1D9E75'; }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setRange(r) {
  currentRange = r;
  document.querySelectorAll('.range-btn').forEach(b => b.classList.toggle('active', b.dataset.range === r));
  const custom = document.getElementById('custom-range');
  if (r === 'custom') {
    custom.classList.add('visible');
    const today = new Date().toISOString().split('T')[0];
    const week = new Date(); week.setDate(week.getDate()-7);
    document.getElementById('from-date').value = week.toISOString().split('T')[0];
    document.getElementById('to-date').value = today;
  } else {
    custom.classList.remove('visible');
    loadAll();
  }
}

function loadCustom() {
  const from = document.getElementById('from-date').value;
  const to = document.getElementById('to-date').value;
  if (!from || !to) return;
  loadAll(from, to);
}

function downloadPDF() {
  const meta = document.getElementById('report-meta').textContent;
  document.title = 'Peak Flow — ' + meta;
  window.print();
}

async function sendReport() {
  const btn = document.getElementById('send-btn');
  btn.textContent = 'Sending...';
  btn.disabled = true;
  try {
    await fetch(WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ client: 'peak-flow', range: currentRange, from: currentFrom, to: currentTo })
    });
    toast('Report sent successfully');
  } catch(e) {
    toast('Send failed — try again');
  }
  btn.textContent = 'Send report';
  btn.disabled = false;
}

function renderKPIs(jobs) {
  const total = jobs.length;
  const completed = jobs.filter(j=>j.status==='completed').length;
  const inprog = jobs.filter(j=>j.status==='in-progress').length;
  const sched = jobs.filter(j=>j.status==='scheduled').length;
  const rev = jobs.filter(j=>j.revenue).reduce((a,j)=>a+j.revenue,0);
  const revJobs = jobs.filter(j=>j.revenue);
  const avg = revJobs.length ? rev/revJobs.length : 0;
  document.getElementById('kpis').innerHTML =
    '<div class="kpi"><div class="kpi-label">Total jobs</div><div class="kpi-val">'+total+'</div><div class="kpi-sub">In period</div></div>'+
    '<div class="kpi"><div class="kpi-label">Completed</div><div class="kpi-val" style="color:#1D9E75">'+completed+'</div><div class="kpi-sub" style="color:#1D9E75">'+(total?Math.round(completed/total*100):0)+'% rate</div></div>'+
    '<div class="kpi"><div class="kpi-label">In progress</div><div class="kpi-val" style="color:#185FA5">'+inprog+'</div><div class="kpi-sub">Active now</div></div>'+
    '<div class="kpi"><div class="kpi-label">Scheduled</div><div class="kpi-val">'+sched+'</div><div class="kpi-sub">Upcoming</div></div>'+
    '<div class="kpi"><div class="kpi-label">Period revenue</div><div class="kpi-val">'+fmt$(rev)+'</div><div class="kpi-sub">Completed jobs</div></div>'+
    '<div class="kpi"><div class="kpi-label">Avg job value</div><div class="kpi-val">'+fmt$(avg)+'</div><div class="kpi-sub">Per job</div></div>';
}

function renderFunnel(pipeline) {
  const stages = ['lead','quoted','scheduled','completed','invoiced'];
  const colors = { lead:'#378ADD', quoted:'#7F77DD', scheduled:'#EF9F27', completed:'#1D9E75', invoiced:'#D85A30' };
  const thisWeek = pipeline.filter(d=>d.week_label==='This week');
  const lastWeek = pipeline.filter(d=>d.week_label==='Last week');
  const maxVal = Math.max(...pipeline.map(d=>d.total_value||0), 1);
  const rows = stages.map(s=>{
    const tw = thisWeek.find(d=>d.stage===s);
    const lw = lastWeek.find(d=>d.stage===s);
    const pct = tw ? Math.round((tw.total_value/maxVal)*100) : 0;
    const delta = tw&&lw ? tw.count-lw.count : null;
    const dHtml = delta===null?'<span style="color:#9c9a92">—</span>':delta>0?'<span style="color:#1D9E75">+'+delta+'</span>':delta<0?'<span style="color:#E24B4A">'+delta+'</span>':'<span style="color:#9c9a92">0</span>';
    return '<div class="funnel-row"><span class="funnel-label">'+s.charAt(0).toUpperCase()+s.slice(1)+'</span><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:'+pct+'%;background:'+colors[s]+';"></div></div><span class="funnel-val">'+(tw?fmt$(tw.total_value):'—')+'</span><span class="funnel-delta">'+dHtml+'</span></div>';
  }).join('');
  document.getElementById('funnel-wrap').innerHTML = '<div style="display:flex;justify-content:flex-end;gap:16px;margin-bottom:12px;font-size:11px;color:#9c9a92;"><span>Value this week</span><span style="min-width:28px;text-align:right;">vs last</span></div>'+rows;
}

function renderJobs(jobs) {
  if (!jobs.length) { document.getElementById('jobs-wrap').innerHTML = '<p class="empty">No jobs in this period.</p>'; return; }
  const sorted = [...jobs].sort((a,b)=>new Date(b.scheduled_date)-new Date(a.scheduled_date)).slice(0,10);
  document.getElementById('jobs-wrap').innerHTML = sorted.map(j=>
    '<div class="job-row"><div style="flex:1;min-width:0;"><div class="job-title">'+j.title+'</div><div class="job-meta">'+j.assigned_to+' &middot; '+j.service_type+' &middot; '+new Date(j.scheduled_date).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div></div><div class="job-right">'+prioBadge(j.priority)+statusBadge(j.status)+'<span style="font-size:12px;color:#6b6b67;min-width:48px;text-align:right;">'+(j.revenue?fmt$(j.revenue):'—')+'</span></div></div>'
  ).join('');
}

function renderTechs(technicians) {
  document.getElementById('tech-wrap').innerHTML = technicians.map(t=>
    '<div class="tech-row"><div class="tech-avatar">'+initials(t.name)+'</div><div style="flex:1;min-width:0;"><div class="tech-name">'+t.name+'</div><div class="tech-meta">'+t.specialty+' &middot; '+t.completed_this_week+' completed &middot; '+t.active_jobs+' active</div><div class="util-track"><div class="util-fill" style="width:'+t.utilization_pct+'%;background:'+utilColor(t.utilization_pct)+';"></div></div></div><div class="util-pct" style="color:'+utilColor(t.utilization_pct)+';">'+t.utilization_pct+'%</div></div>'
  ).join('');
}

function renderAlerts(alerts) {
  const active = alerts.filter(a=>!a.resolved);
  if (!active.length) { document.getElementById('alerts-wrap').innerHTML = '<p class="empty">No active alerts.</p>'; return; }
  document.getElementById('alerts-wrap').innerHTML = active.map(a=>
    '<div class="alert-row"><div class="alert-dot dot-'+a.type+'"></div><div><div class="alert-msg">'+a.message+'</div><div class="alert-meta">'+a.type.charAt(0).toUpperCase()+a.type.slice(1)+' &middot; '+new Date(a.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric'})+'</div></div></div>'
  ).join('');
}

function renderSummary(summary) {
  document.getElementById('ai-summary').innerHTML = '<p>'+summary+'</p>';
}

async function loadAll(fromOverride, toOverride) {
  document.getElementById('report-meta').textContent = 'Operational report — loading...';
  try {
    let url = API + '?client=peak-flow&range=' + currentRange;
    if (fromOverride && toOverride) url = API + '?client=peak-flow&from='+fromOverride+'&to='+toOverride;
    const res = await fetch(url);
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    currentFrom = d.from;
    currentTo = d.to;
    const fromLabel = new Date(d.from).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const toLabel = new Date(d.to).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    document.getElementById('report-meta').textContent = 'Operational report — '+fromLabel+' to '+toLabel;
    renderKPIs(d.jobs);
    renderFunnel(d.pipeline);
    renderJobs(d.jobs);
    renderTechs(d.technicians);
    renderAlerts(d.alerts);
    renderSummary(d.summary);
  } catch(err) {
    document.getElementById('report-meta').textContent = 'Error — ' + err.message;
  }
}

// ── Audio player ──────────────────────────────────────────────
let audioEl = null;
let audioRafId = null;

function getAudioParams() {
  const p = new URLSearchParams(window.location.search);
  const client = p.get('client') || 'peak-flow';
  const range  = p.get('range')  || currentRange;
  const from   = p.get('from')   || null;
  const to     = p.get('to')     || null;
  if (from && to) return `/api/audio?client=${client}&from=${from}&to=${to}`;
  return `/api/audio?client=${client}&range=${range}`;
}

function audioSetState(state) {
  document.getElementById('audio-idle').style.display       = state === 'idle'    ? 'flex' : 'none';
  document.getElementById('audio-loading').style.display    = state === 'loading' ? 'flex' : 'none';
  document.getElementById('audio-player-row').style.display = state === 'ready'   ? 'flex' : 'none';
  document.getElementById('audio-error').style.display      = state === 'error'   ? 'flex' : 'none';
}

function fmtTime(sec) {
  const s = Math.floor(sec || 0);
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}

function startProgressLoop() {
  if (audioRafId) cancelAnimationFrame(audioRafId);
  function tick() {
    if (!audioEl) return;
    const dur = audioEl.duration || 0;
    const cur = audioEl.currentTime || 0;
    const pct = dur ? (cur / dur) * 100 : 0;
    document.getElementById('progress-fill').style.width = pct + '%';
    document.getElementById('time-display').textContent = fmtTime(cur) + ' / ' + fmtTime(dur);
    if (!audioEl.paused && !audioEl.ended) {
      audioRafId = requestAnimationFrame(tick);
    }
  }
  audioRafId = requestAnimationFrame(tick);
}

function togglePlay() {
  if (!audioEl) return;
  if (audioEl.paused) {
    audioEl.play();
    document.getElementById('play-icon').style.display  = 'none';
    document.getElementById('pause-icon').style.display = 'block';
    startProgressLoop();
  } else {
    audioEl.pause();
    document.getElementById('play-icon').style.display  = 'block';
    document.getElementById('pause-icon').style.display = 'none';
  }
}

function seekAudio(e) {
  if (!audioEl || !audioEl.duration) return;
  const rect = document.getElementById('progress-wrap').getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audioEl.currentTime = pct * audioEl.duration;
  document.getElementById('progress-fill').style.width = (pct * 100) + '%';
  if (!audioEl.paused) startProgressLoop();
}

async function generateAudio() {
  audioSetState('loading');
  document.getElementById('audio-gen-btn').disabled = true;
  if (audioEl) { audioEl.pause(); audioEl = null; }
  if (audioRafId) { cancelAnimationFrame(audioRafId); audioRafId = null; }

  try {
    const url = getAudioParams();
    const res = await fetch(url);
    const data = await res.json();
    if (!res.ok || !data.audio_base64) throw new Error(data.error || 'No audio returned');

    const binary = atob(data.audio_base64);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    const blob = new Blob([bytes], { type: 'audio/mpeg' });
    const blobUrl = URL.createObjectURL(blob);

    audioEl = new Audio(blobUrl);
    audioEl.addEventListener('ended', () => {
      document.getElementById('play-icon').style.display  = 'block';
      document.getElementById('pause-icon').style.display = 'none';
      document.getElementById('progress-fill').style.width = '100%';
    });
    audioEl.addEventListener('loadedmetadata', () => {
      document.getElementById('time-display').textContent = '0:00 / ' + fmtTime(audioEl.duration);
    });

    audioSetState('ready');
    document.getElementById('play-icon').style.display  = 'block';
    document.getElementById('pause-icon').style.display = 'none';
    document.getElementById('progress-fill').style.width = '0';
  } catch (e) {
    document.getElementById('audio-err-msg').textContent = e.message || 'Generation failed.';
    audioSetState('error');
  }
  document.getElementById('audio-gen-btn').disabled = false;
}

loadAll();
</script>
